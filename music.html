<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Audio Button</title>
    <style>
        /* Basic styling for the custom button */
        #playButton {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 32px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
        }
        #playButton:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <!-- The Hidden Audio Element -->
    <audio id="myAudio">
        <source src="https://pixelman.net/tbg.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- The Play/Pause Button -->
    <button id="playButton" onclick="togglePlay()">Play Music</button>

    <script>
        // Get the audio element
        const audio = document.getElementById("myAudio");
        const button = document.getElementById("playButton");

        function togglePlay() {
            // Check if the audio is paused
            if (audio.paused) {
                audio.play();
                button.innerText = "Pause Music";
            } else {
                audio.pause();
                button.innerText = "Play Music";
            }
        }
    </script>

</body>
</html>
