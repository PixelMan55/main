<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pixel Platforms Editor</title>

<style>
body{
margin:0;
overflow:hidden;
background:#0b0b22;
font-family:Arial;
}

#game{
width:100vw;
height:100vh;
position:relative;
overflow:hidden;
}

#topBar{
position:fixed;

top:18px;
left:50%;

transform:translateX(-50%);

display:flex;
gap:12px;
align-items:center;
justify-content:center;

padding:16px 22px;

background:
linear-gradient(
180deg,
rgba(25,25,55,0.96),
rgba(10,10,25,0.93)
);

border:2px solid rgba(255,255,255,0.08);

border-radius:26px;

backdrop-filter:blur(18px);

box-shadow:
0 20px 50px rgba(0,0,0,0.5),
0 0 60px rgba(0,140,255,0.12);

z-index:1000;
}

#editorBar{
position:fixed;

left:0;
right:0;
bottom:0;

display:flex;
gap:12px;

align-items:center;

padding:16px 22px;

overflow-x:auto;

background:
linear-gradient(
180deg,
rgba(22,22,45,0.96),
rgba(10,10,20,0.98)
);

border-top:2px solid rgba(255,255,255,0.08);

backdrop-filter:blur(16px);

box-shadow:
0 -10px 35px rgba(0,0,0,0.45);

z-index:1000;
}

#editorBar::-webkit-scrollbar{
height:10px;
}

#editorBar::-webkit-scrollbar-thumb{
background:#555;
border-radius:999px;
}

#editorBar::-webkit-scrollbar-track{
background:transparent;
}



button{

position:relative;

padding:12px 18px;

border:none;

border-radius:16px;

background:
linear-gradient(
180deg,
#34345f,
#1b1b36
);

color:white;

font-weight:900;
font-size:14px;
letter-spacing:0.4px;

cursor:pointer;

transition:
transform 0.12s,
filter 0.12s,
box-shadow 0.12s,
border 0.12s;

border:2px solid rgba(255,255,255,0.05);

box-shadow:
0 6px 14px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.08);

overflow:hidden;
}

.toolBtn{
width:140px;
height:58px;
align-items:center;
justify-content:center;

padding:0 12px;

white-space:nowrap;
}



button::before{
content:"";

position:absolute;
top:0;
left:0;
right:0;

height:45%;

background:
linear-gradient(
180deg,
rgba(255,255,255,0.18),
transparent
);

pointer-events:none;
}

button:hover{

transform:
translateY(-3px)
scale(1.04);

filter:brightness(1.08);

box-shadow:
0 10px 25px rgba(0,0,0,0.45),
0 0 24px rgba(0,140,255,0.18);

}

.modeActive{

background:
linear-gradient(
180deg,
#5ec8ff,
#0077ff
)!important;

border:2px solid rgba(255,255,255,0.25);

box-shadow:
0 0 28px rgba(0,140,255,0.8),
0 10px 25px rgba(0,0,0,0.45);

transform:
translateY(-2px)
scale(1.06);

}
.toolActive{

background:
linear-gradient(
180deg,
#ffca63,
#ff7b00
)!important;

border:2px solid rgba(255,255,255,0.2);

box-shadow:
0 0 28px rgba(255,140,0,0.8),
0 10px 25px rgba(0,0,0,0.45);

transform:
translateY(-2px)
scale(1.06);

}

.editorOnly{
display:none;
}

.player{
position:absolute;

width:30px;
height:30px;

background:
linear-gradient(
135deg,
#7df9ff,
#00b7ff
);

border-radius:8px;

box-shadow:
0 0 25px rgba(0,255,255,0.8),
0 0 60px rgba(0,180,255,0.35);

transition:transform 0.08s linear;
}

.block{
position:absolute;

width:120px;
height:20px;

background:
purple;

border-radius:8px;
}

.spike{
position:absolute;

width:30px;
height:30px;

background:
linear-gradient(
180deg,
#ff7070,
#d11414
);

clip-path:polygon(50% 0,0 100%,100% 100%);

filter:
drop-shadow(0 0 10px rgba(255,0,0,0.5));
}

.upspike{
position:absolute;

width:30px;
height:30px;

background:
linear-gradient(
180deg,
#ff7070,
#d11414
);

clip-path:polygon(0 0,100% 0,50% 100%);

filter:
drop-shadow(0 0 10px rgba(255,0,0,0.5));
}



.fakeblock{
position:absolute;
width:120px;
height:20px;
background:purple;
border-radius:6px;
}

.fakespike{
position:absolute;

width:30px;
height:30px;

background:
linear-gradient(
180deg,
#ff7070,
#d11414
);

clip-path:polygon(50% 0,0 100%,100% 100%);

filter:
drop-shadow(0 0 10px rgba(255,0,0,0.5));
}

.invisblock{
position:absolute;
width:120px;
height:20px;
background:gray;
border-radius:6px;
opacity:0.5;
}

.invisspike{
position:absolute;
width:30px;
height:30px;
background:gray;
clip-path:polygon(50% 0,0 100%,100% 100%);
opacity:0.5;
}

.portal{
position:absolute;

width:34px;
height:60px;

background:
linear-gradient(
180deg,
#6de8ff,
#007dff
);

border-radius:14px;

box-shadow:
0 0 25px rgba(0,191,255,0.75);

border:2px solid rgba(255,255,255,0.2);
}

.gportal{
position:absolute;

width:34px;
height:60px;

background:
linear-gradient(
180deg,
#ffd76a,
#ff8c00
);

border-radius:14px;

box-shadow:
0 0 25px rgba(255,170,0,0.75);

border:2px solid rgba(255,255,255,0.2);
}

.goal{
position:absolute;

width:44px;
height:90px;

border-radius:14px;

background:
linear-gradient(
180deg,
#7dff90,
#00b84a
);

box-shadow:
0 0 35px rgba(0,255,100,0.7);

border:2px solid rgba(255,255,255,0.15);
}

/* BETTER GLOW */
.glowdeco{
position:absolute;
width:120px;
height:120px;
border-radius:50%;
pointer-events:none;
filter:blur(30px);
opacity:0.55;
mix-blend-mode:screen;
}

/* BETTER PULSE */
.pulselight{
position:absolute;
width:180px;
height:180px;
border-radius:50%;
pointer-events:none;
opacity:0.35;
animation:pulseLight 1.4s infinite ease-in-out;
filter:blur(8px);

box-shadow:
0 0 40px currentColor,
0 0 120px currentColor;
}

@keyframes pulseLight{

0%{
transform:scale(0.8);
opacity:0.2;
}

50%{
transform:scale(1.2);
opacity:0.7;
}

100%{
transform:scale(0.8);
opacity:0.2;
}

}

/* BETTER CHAIN */
.chain{
position:absolute;
width:18px;

background:
repeating-linear-gradient(
180deg,
#d0d0d0 0px,
#8d8d8d 10px,
#4e4e4e 20px,
#d0d0d0 30px
);

border-radius:999px;

box-shadow:
0 0 10px rgba(255,255,255,0.18),
inset 0 0 6px rgba(255,255,255,0.4);

transform-origin:top center;
}

/* BETTER COLOR PICKER BUTTON */
.colorPickWrap{
position:relative;

display:flex;
align-items:center;
justify-content:center;

gap:8px;

padding:12px 18px;

border-radius:16px;

background:
linear-gradient(
180deg,
#34345f,
#1b1b36
);

color:white;

font-weight:900;
font-size:14px;

cursor:pointer;

border:2px solid rgba(255,255,255,0.05);

box-shadow:
0 6px 14px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.08);

overflow:hidden;
}

.colorPickWrap input{
position:absolute;
inset:0;
opacity:0;
cursor:pointer;
}

.bgdeco{
position:absolute;
width:240px;
height:140px;

background:
linear-gradient(
180deg,
rgba(255,255,255,0.08),
rgba(255,255,255,0.02)
);

border:2px solid rgba(255,255,255,0.08);

border-radius:20px;

backdrop-filter:blur(4px);

pointer-events:none;
}

.pulselight{ position:absolute; width:180px; height:180px; border-radius:50%; pointer-events:none; opacity:0.35; animation:pulseLight 1.4s infinite ease-in-out; filter:blur(8px); box-shadow: 0 0 40px currentColor, 0 0 120px currentColor; }

@keyframes pulseLight{

0%{
transform:scale(0.8);
opacity:0.2;
}

50%{
transform:scale(1.2);
opacity:0.7;
}

100%{
transform:scale(0.8);
opacity:0.2;
}

}

#userDisplay{
position:fixed;
top:10px;
right:10px;
color:white;
background:#111;
padding:6px 10px;
border-radius:6px;
z-index:1000;
}

#popup{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.85);
z-index:10000;
}

#popup.show{
display:flex;
}

#panel{
background:#111;
padding:20px;
border-radius:10px;
display:flex;
flex-direction:column;
gap:8px;
min-width:200px;
}

input{
padding:8px;
border:none;
border-radius:6px;
background:#222;
color:white;
}
</style>
</head>

<body>

<div id="topBar">

<button
id="playBtn"
class="modeBtn modeActive"
onclick="setMode('play')">
▶ Play
</button>

<button
id="editBtn"
class="modeBtn"
onclick="setMode('edit')">
🛠 Edit
</button>

<button onclick="loadFeed()">
🌎 Feed
</button>

<button onclick="searchLevels()">
🔎 Search
</button>

<button onclick="openPopup()">
👤 Login
</button>

<button onclick="uploadLevel()" id="uplBtn">
☁ Upload
</button>

</div>

<div id="editorBar" class="editorOnly">

<button onclick="changePage(-1)">
⬅
</button>

<div id="editorPage"></div>

<button onclick="changePage(1)">
➡
</button>

</div>

<div id="userDisplay">Not logged in</div>

<div id="popup">
<div id="panel">
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<input id="usernameInput" placeholder="username (signup only)">
<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>
<button onclick="closePopup()">Close</button>
</div>
</div>

<div id="game"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy,
limit,
updateDoc,
doc,
increment,
where,
setDoc,
getDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyDk5qh-pydPe6vfBG7KFhl50zderbGggW4",
authDomain:"gdeditor-b9a32.firebaseapp.com",
projectId:"gdeditor-b9a32"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* USER */
let currentUser = null;
let username = "";
let editingLevelId = null;
let playingOnlineLevel=false;
let currentLevelVerified = false;
let currentLevelBeaten = false;


onAuthStateChanged(auth, async(u)=>{

currentUser = u;

const display = document.getElementById("userDisplay");

if(!u){
username="";
display.innerText="Not logged in";
return;
}

try{

const snap = await getDoc(doc(db,"users",u.uid));

if(snap.exists()){
username = snap.data().username || "";
display.innerText = username;
}else{
display.innerText = "No profile";
}

}catch(e){
console.error(e);
display.innerText = "Error";
}

});

/* POPUP */
const popup=document.getElementById("popup");

window.openPopup=()=>{
popup.classList.add("show");
};

window.closePopup=()=>{
popup.classList.remove("show");
};

/* AUTH */
window.login=async()=>{

try{

await signInWithEmailAndPassword(
auth,
email.value,
pass.value
);

closePopup();

}catch(e){
alert(e.message);
}

};

window.signup=async()=>{

try{

const name=usernameInput.value.trim();

if(!name) return alert("Enter username");

const user = await createUserWithEmailAndPassword(
auth,
email.value,
pass.value
);

await setDoc(doc(db,"users",user.user.uid),{
username:name
});

username=name;

alert("Account created!");

closePopup();

}catch(e){
alert(e.message);
}

};

const editorPages=[

[
["block","🟪 Block"],
["spike","🔺 Spike"],
["upspike","🔻 Upside Spike"],
["fakeblock","🟫 Fake Block"],
["fakespike","⚠ Fake Spike"],
["invisblock","⬜ Invis Block"],
["invisspike","⚪ Invis Spike"],
["portal","🌀 Up Portal"],
["gportal","🌗 Down Portal"],
["glow","✨ Glow"],
["pulse","💡 Pulse"],
["goal","🏁 Goal"]
],

[
["chain","⛓ Chain"],
["bgdeco","🖼 BG"],
["delete","🗑 Delete"],
["save","💾 Save"],
["load","📂 Load"]
]

];

function renderEditorPage(){

const page=document.getElementById("editorPage");

page.innerHTML="";

editorPages[editorPage].forEach(([id,label])=>{

if(id==="save"){

const b=document.createElement("button");
b.innerText=label;
b.onclick=saveLevel;
page.appendChild(b);
return;

}

if(id==="load"){

const b=document.createElement("button");
b.innerText=label;
b.onclick=()=>loadLevel(prompt("Paste code"));
page.appendChild(b);
return;

}

const b=document.createElement("button");

b.id=id+"Btn";

b.className="toolBtn";

b.innerText=label;

b.onclick=()=>setTool(id);

if(tool===id){
b.classList.add("toolActive");
}

page.appendChild(b);

});

/* color picker */
const wrap=document.createElement("label");

wrap.className="colorPickWrap";

wrap.innerHTML=`
🎨 Color
<input type="color" id="colorPicker" value="#800080">
`;

page.appendChild(wrap);

}

window.changePage=(dir)=>{

editorPage+=dir;

if(editorPage<0){
editorPage=editorPages.length-1;
}

if(editorPage>=editorPages.length){
editorPage=0;
}

renderEditorPage();

};

/* GAME */
const game=document.getElementById("game");

let mode="play";
let tool="block";
let gravity=1;
let editorPage=0;



let camera={
x:0,
y:0
};

let keys={};

let player={
x:100,
y:200,
vx:0,
vy:0,
grounded:false,
canJump:true
};

let rotation=0;

const p=document.createElement("div");
p.className="player";
game.appendChild(p);

/* WORLD */
let blocks=[];
let spikes=[];
let fakeblocks=[];
let fakespikes=[];
let upspikes=[];
let invisblocks=[];
let invisspikes=[];
let portals=[];
let gportals=[];
let glows=[];
let chains=[];
let bgdecos=[];
let pulselights=[];
let goal=null;

/* INPUT */
addEventListener("keydown",e=>{

keys[e.key]=true;

if(
(e.key===" " || e.key==="ArrowUp")
&& player.canJump
&& player.grounded
){

player.vy = -10 * gravity;

player.canJump=false;

player.grounded=false;

}

});

addEventListener("keyup",e=>{

keys[e.key]=false;

if(e.key===" " || e.key==="ArrowUp"){
player.canJump=true;
}

});

/* UI */
window.setMode=(m)=>{

if(m==="edit"){

playingOnlineLevel=false;

}

mode=m;

/* mode glow */
document.querySelectorAll(".modeBtn").forEach(b=>{
b.classList.remove("modeActive");
});

document.getElementById(m+"Btn")
?.classList.add("modeActive");

/* editor ui */
updateEditorUI();
renderEditorPage();

};
window.setTool=(t)=>{

tool=t;

document.querySelectorAll(".toolBtn").forEach(b=>{
b.classList.remove("toolActive");
});

document.getElementById(t+"Btn")
?.classList.add("toolActive");

};

function updateEditorUI(){

const editorBar=document.getElementById("editorBar");

editorBar.style.display =
(mode==="edit" && !playingOnlineLevel)
? "flex"
: "none";

const editBtn=document.getElementById("editBtn");
const uplBtn=document.getElementById("uplBtn");

if(playingOnlineLevel){

editBtn.style.display="none";
uplBtn.style.display="none";
}else{

editBtn.style.display="";
uplBtn.style.display="";
}

}

function make(cls,x,y,arr,color=null,extra={}){

let el=document.createElement("div");

el.className=cls;

if(color){

if(
cls==="block" ||
cls==="fakeblock"
){
el.style.background=color;
}

if(
cls==="glowdeco" ||
cls==="pulselight"
){
el.style.background=color;
}

}

if(cls==="pulselight"){
el.style.color=color;
}

Object.assign(el.style,extra);

game.appendChild(el);

arr.push({
x,
y,
el,
color,
extra
});

}

const addBlock=(x,y,color)=>make("block",x,y,blocks,color);
const addSpike=(x,y)=>make("spike",x,y,spikes);
const addFakeBlock=(x,y,color)=>make("fakeblock",x,y,fakeblocks,color);
const addUpSpike=(x,y)=>make("upspike",x,y,upspikes);
const addFakeSpike=(x,y)=>make("fakespike",x,y,fakespikes);
const addInvisBlock=(x,y)=>make("invisblock",x,y,invisblocks);
const addInvisSpike=(x,y)=>make("invisspike",x,y,invisspikes);
const addPortal=(x,y)=>make("portal",x,y,portals);
const addGPortal=(x,y)=>make("gportal",x,y,gportals);
const addGlow=(x,y,color)=>
make("glowdeco",x,y,glows,color);

const addChain=(x,y)=>
make("chain",x,y,chains,null,{
height:(120+Math.random()*220)+"px",
transform:`rotate(${(-8+Math.random()*16)}deg)`
});

const addBGDeco=(x,y)=>
make("bgdeco",x,y,bgdecos);

const addPulse=(x,y,color)=>
make("pulselight",x,y,pulselights,color);


function addGoal(x,y){

if(goal){
goal.el.remove();
}

let el=document.createElement("div");

el.className="goal";

game.appendChild(el);

goal={
x,
y,
el
};

}

/* SAVE */
window.saveLevel=()=>{

const data={

blocks:blocks.map(b=>({
x:b.x,
y:b.y,
color:b.color
})),

spikes:spikes.map(s=>({
x:s.x,
y:s.y
})),

upspikes:upspikes.map(s=>({
x:s.x,
y:s.y
})),

fakeblocks:fakeblocks.map(b=>({
x:b.x,
y:b.y,
color:b.color
})),

fakespikes:fakespikes.map(s=>({
x:s.x,
y:s.y
})),

invisblocks:invisblocks.map(b=>({
x:b.x,
y:b.y
})),

invisspikes:invisspikes.map(s=>({
x:s.x,
y:s.y
})),

portals:portals.map(p=>({
x:p.x,
y:p.y
})),

gportals:gportals.map(g=>({
x:g.x,
y:g.y
})),

glows:glows.map(g=>({
x:g.x,
y:g.y,
color:g.color
})),

pulselights:pulselights.map(p=>({
x:p.x,
y:p.y,
color:p.color
})),

goal:goal ? {
x:goal.x,
y:goal.y
} : null

};

prompt(
"COPY",
btoa(JSON.stringify(data))
);

};

/* LOAD */
window.loadLevel=(code)=>{

const d=JSON.parse(atob(code));

[
glows,
chains,
bgdecos,
pulselights,

blocks,
spikes,
upspikes,
fakeblocks,
fakespikes,
invisblocks,
invisspikes,
portals,
gportals
].forEach(arr=>{

arr.forEach(o=>o.el.remove());

});

if(goal){
goal.el.remove();
}

blocks=[];
spikes=[];
fakeblocks=[];
fakespikes=[];
portals=[];
gportals=[];
glows=[];
pulselights=[];
upspikes=[];
goal=null;

(d.blocks||[]).forEach(b=>addBlock(b.x,b.y,b.color));
(d.spikes||[]).forEach(s=>addSpike(s.x,s.y));
(d.fakeblocks||[]).forEach(b=>addFakeBlock(b.x,b.y,b.color));
(d.fakespikes||[]).forEach(s=>addFakeSpike(s.x,s.y));
(d.invisblocks||[]).forEach(b=>addInvisBlock(b.x,b.y));
(d.invisspikes||[]).forEach(s=>addInvisSpike(s.x,s.y));
(d.upspikes||[]).forEach(s=>addUpSpike(s.x,s.y));
(d.portals||[]).forEach(p=>addPortal(p.x,p.y));
(d.gportals||[]).forEach(g=>addGPortal(g.x,g.y));

(d.glows||[]).forEach(g=>
addGlow(g.x,g.y,g.color)
);

(d.pulselights||[]).forEach(p=>
addPulse(p.x,p.y,p.color)
);

if(d.goal){
addGoal(d.goal.x,d.goal.y);
}

};

/* UPLOAD */
window.uploadLevel = async()=>{

if(!currentUser){
return alert("Login first");
}

if(!username){
return alert("Username not loaded yet.");
}

const code = btoa(JSON.stringify({

blocks:blocks.map(b=>({
x:b.x,
y:b.y,
color:b.color
})),

spikes:spikes.map(s=>({
x:s.x,
y:s.y
})),

upspikes:upspikes.map(s=>({
x:s.x,
y:s.y
})),

fakeblocks:fakeblocks.map(b=>({
x:b.x,
y:b.y,
color:b.color
})),

fakespikes:fakespikes.map(s=>({
x:s.x,
y:s.y
})),

invisblocks:invisblocks.map(b=>({
x:b.x,
y:b.y
})),

invisspikes:invisspikes.map(s=>({
x:s.x,
y:s.y

/* UPDATE */
function update(){

if(mode==="play"){

camera.x+=(player.x-200-camera.x)*0.08;
camera.y+=(player.y-200-camera.y)*0.08;

}

/* EDITOR CAMERA MOVEMENT */
if(mode==="edit"){

const speed = 10;

if(keys["a"] || keys["ArrowLeft"]){
camera.x -= speed;
}

if(keys["d"] || keys["ArrowRight"]){
camera.x += speed;
}

if(keys["w"] || keys["ArrowUp"]){
camera.y -= speed;
}

if(keys["s"] || keys["ArrowDown"]){
camera.y += speed;
}

}

if(mode==="play"){

if(keys["a"]||keys["ArrowLeft"]){
player.vx=-4;
}
else if(keys["d"]||keys["ArrowRight"]){
player.vx=4;
}
else{
player.vx*=0.8;
}

player.vy += 0.6 * gravity;

player.x+=player.vx;
player.y+=player.vy;

if(
player.y > window.innerHeight + 2000 ||
player.y < -2000
){

killPlayer();

keys={};

rotation=0;

gravity=1;

}

/* COLLISION */
player.grounded=false;

blocks.forEach(b=>{

if(
player.x < b.x + 120 &&
player.x + 30 > b.x &&
player.y < b.y + 20 &&
player.y + 30 > b.y
){

/* normal gravity */
if(gravity === 1 && player.vy >= 0){

player.y = b.y - 30;

player.vy = 0;

player.grounded = true;

}

/* upside down gravity */
if(gravity === -1 && player.vy <= 0){

player.y = b.y + 20;

player.vy = 0;

player.grounded = true;

}

}

});
/* ROTATION */
if(!player.grounded){

rotation += 8 * gravity;

}else{

/* snap to cube */
rotation = Math.round(rotation/90)*90;

}

/* SPIKES */
spikes.forEach(s=>{

if(
Math.abs(player.x-s.x)<25 &&
Math.abs(player.y-s.y)<25
){

killPlayer(s);

player.vx=0;
player.vy=0;

keys={};

rotation=0;

}

});

upspikes.forEach(s=>{

if(
Math.abs(player.x-s.x)<25 &&
Math.abs(player.y-s.y)<25
){

killPlayer();

player.vx=0;
player.vy=0;

keys={};

rotation=0;

}

});

portals.forEach(s=>{

if(
Math.abs(player.x-s.x)<25 &&
Math.abs(player.y-s.y)<35
){

gravity=-1;

}

});

gportals.forEach(s=>{

if(
Math.abs(player.x-s.x)<25 &&
Math.abs(player.y-s.y)<35
){

gravity=1;

}

});

invisspikes.forEach(s=>{

if(
Math.abs(player.x-s.x)<25 &&
Math.abs(player.y-s.y)<25
){

killPlayer(s);

}

});

invisblocks.forEach(b=>{

if(
player.x < b.x + 120 &&
player.x + 30 > b.x &&
player.y < b.y + 20 &&
player.y + 30 > b.y
){

/* normal gravity */
if(gravity === 1 && player.vy >= 0){

player.y = b.y - 30;

player.vy = 0;

player.grounded = true;
rotation=0;
}

/* upside down gravity */
if(gravity === -1 && player.vy <= 0){

player.y = b.y + 20;

player.vy = 0;

player.grounded = true;
rotation=0;
}

}

});

/* GOAL */
if(goal){

if(

player.x < goal.x+40 &&
player.x+30 > goal.x &&
player.y < goal.y+80 &&
player.y+30 > goal.y

){

alert("Level Complete!");

currentLevelBeaten = true;

/* local verification */
if(!currentLevelVerified){

currentLevelVerified = true;

}

/* existing uploaded level */
if(editingLevelId){

updateDoc(
doc(db,"levels",editingLevelId),
{
verified:true
}
);

}

player.x=100;
player.y=200;
player.vx=0;
player.vy=0;

player.grounded=false;
player.canJump=true;

keys={};

gravity=1;

}

}

}

/* RENDER */
p.style.left=(player.x-camera.x)+"px";
p.style.top=(player.y-camera.y)+"px";

`rotate(${rotation}deg) scaleY(${gravity})`;

[
glows,
chains,
bgdecos,
pulselights,

blocks,
spikes,
fakeblocks,
fakespikes,
invisblocks,

upspikes,

gportals

function killPlayer(){

const death=document.createElement("div");

death.style.position="absolute";
death.style.left=player.x+"px";
death.style.top=player.y+"px";

death.style.width="30px";
death.style.height="30px";

death.style.borderRadius="8px";
death.style.background="cyan";

death.style.pointerEvents="none";
death.style.boxShadow="0 0 40px cyan";

death.style.zIndex="999";

game.appendChild(death);

let start=performance.now();

function animateDeath(t){

let elapsed=t-start;

let progress=elapsed/300;

if(progress>=1){
death.remove();
return;
}

let size=1+(progress*2);
let opacity=1-progress;

death.style.transform=
`translate(${-15*(size-1)}px,${-15*(size-1)}px) scale(${size})`;

death.style.opacity=opacity;

requestAnimationFrame(animateDeath);

}

requestAnimationFrame(animateDeath);

/* respawn */
player.x=100;
player.y=200;

player.vx=0;
player.vy=0;

player.grounded=false;
player.canJump=true;

gravity=1;

rotation=0;

}

addBlock(50,300);
updateEditorUI();
update();
