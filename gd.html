<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GD Full Online FINAL</title>

<style>
body{margin:0;overflow:hidden;background:#0b0b22;font-family:Arial;}
#game{width:100vw;height:100vh;position:relative;overflow:hidden;}

#ui{
position:fixed;top:10px;left:10px;
display:flex;gap:6px;flex-wrap:wrap;
z-index:1000;
}

button{
padding:6px 10px;border:none;border-radius:6px;
background:#222;color:white;cursor:pointer;
}

.player{
position:absolute;
width:30px;height:30px;
background:cyan;
border-radius:6px;
transition:transform 0.1s linear;
}

.block{position:absolute;width:120px;height:20px;background:purple;border-radius:6px;}
.spike{position:absolute;width:30px;height:30px;background:red;clip-path:polygon(50% 0,0 100%,100% 100%);}
.portal{position:absolute;width:30px;height:50px;background:deepskyblue;border-radius:10px;}
.gportal{position:absolute;width:30px;height:50px;background:orange;border-radius:10px;}
.goal{position:absolute;width:40px;height:80px;background:lime;}

#userDisplay{
position:fixed;
top:10px;
right:10px;
color:white;
background:#111;
padding:6px 10px;
border-radius:6px;
z-index:1000;
}

#popup{
position:fixed;inset:0;
display:none;justify-content:center;align-items:center;
background:rgba(0,0,0,0.85);
z-index:10000;
}
#popup.show{display:flex;}

#panel{
background:#111;padding:20px;border-radius:10px;
display:flex;flex-direction:column;gap:8px;
min-width:200px;
}
</style>
</head>

<body>

<div id="ui">
<button onclick="setMode('play')">Play</button>
<button onclick="setMode('edit')">Edit</button>

<button onclick="setTool('block')">Block</button>
<button onclick="setTool('spike')">Spike</button>
<button onclick="setTool('portal')">Portal</button>
<button onclick="setTool('gportal')">Gravity</button>
<button onclick="setTool('goal')">Goal</button>
<button onclick="setTool('delete')">Delete</button>

<button onclick="saveLevel()">Save</button>
<button onclick="loadLevel(prompt('Paste code'))">Load</button>

<button onclick="uploadLevel()">Upload</button>
<button onclick="loadFeed()">Feed</button>
<button onclick="searchLevels()">Search</button>

<button onclick="openPopup()">Login</button>
</div>

<div id="userDisplay">Not logged in</div>

<div id="popup">
<div id="panel">
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<input id="usernameInput" placeholder="username (signup only)">
<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>
<button onclick="closePopup()">Close</button>
</div>
</div>

<div id="game"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
getFirestore, collection, addDoc, getDocs, query,
orderBy, limit, updateDoc, doc, increment, where,
setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* FIREBASE */
const app=initializeApp({
apiKey:"AIzaSyDk5qh-pydPe6vfBG7KFhl50zderbGggW4",
authDomain:"gdeditor-b9a32.firebaseapp.com",
projectId:"gdeditor-b9a32"
});
const auth=getAuth(app);
const db=getFirestore(app);

/* USER */
let currentUser=null;
let username="";

onAuthStateChanged(auth, async (u)=>{
currentUser = u;

const display = document.getElementById("userDisplay");

if(!u){
username = "";
display.innerText = "Not logged in";
return;
}

try{
const snap = await getDoc(doc(db,"users",u.uid));

if(snap.exists()){
username = snap.data().username || "";
display.innerText = username || "No username";
}else{
username = "";
display.innerText = "No profile";
}
}catch(e){
console.error(e);
display.innerText = "Error loading user";
}
});

/* POPUP */
const popup=document.getElementById("popup");
window.openPopup=()=>{
popup.classList.add("show");
document.getElementById("ui").style.pointerEvents="none";
};
window.closePopup=()=>{
popup.classList.remove("show");
document.getElementById("ui").style.pointerEvents="auto";
};

/* AUTH */
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,email.value,pass.value);
closePopup();
}catch(e){alert(e.message);}
};

window.signup=async()=>{
try{
const name=usernameInput.value.trim();
if(!name) return alert("Enter username");

const user=await createUserWithEmailAndPassword(auth,email.value,pass.value);
await setDoc(doc(db,"users",user.user.uid),{username:name});

username=name;
alert("Account created!");
closePopup();
}catch(e){alert(e.message);}
};

/* GAME */
const game=document.getElementById("game");

let mode="play";
let tool="block";
let camera={x:0,y:0};
let keys={};

let player={
x:100,y:200,
vx:0,vy:0,
grounded:false,
canJump:true
};

let rotation=0;

const p=document.createElement("div");
p.className="player";
game.appendChild(p);

/* WORLD */
let blocks=[],spikes=[],portals=[],gportals=[],goal=null;

/* INPUT */
addEventListener("keydown",e=>{
keys[e.key]=true;

if((e.key===" "||e.key==="ArrowUp") && player.canJump && player.grounded){
player.vy=-10;
player.canJump=false;
}
});

addEventListener("keyup",e=>{
keys[e.key]=false;
if(e.key===" "||e.key==="ArrowUp") player.canJump=true;
});

/* UI */
window.setMode=(m)=>mode=m;
window.setTool=(t)=>tool=t;

/* OBJECTS */
function make(cls,x,y,arr){
let el=document.createElement("div");
el.className=cls;
game.appendChild(el);
arr.push({x,y,el});
}
const addBlock=(x,y)=>make("block",x,y,blocks);
const addSpike=(x,y)=>make("spike",x,y,spikes);
const addPortal=(x,y)=>make("portal",x,y,portals);
const addGPortal=(x,y)=>make("gportal",x,y,gportals);

function addGoal(x,y){
if(goal)goal.el.remove();
let el=document.createElement("div");
el.className="goal";
game.appendChild(el);
goal={x,y,el};
}

/* SAVE */
window.saveLevel=()=>{
const data={
blocks:blocks.map(b=>({x:b.x,y:b.y})),
spikes:spikes.map(s=>({x:s.x,y:s.y})),
portals:portals.map(p=>({x:p.x,y:p.y})),
gportals:gportals.map(g=>({x:g.x,y:g.y})),
goal:goal?{x:goal.x,y:goal.y}:null
};
prompt("COPY",btoa(JSON.stringify(data)));
};

/* LOAD */
window.loadLevel=(code)=>{
const d=JSON.parse(atob(code));

[blocks,spikes,portals,gportals].forEach(arr=>arr.forEach(o=>o.el.remove()));
if(goal)goal.el.remove();

blocks=[];spikes=[];portals=[];gportals=[];goal=null;

d.blocks.forEach(b=>addBlock(b.x,b.y));
d.spikes.forEach(s=>addSpike(s.x,s.y));
d.portals.forEach(p=>addPortal(p.x,p.y));
d.gportals.forEach(g=>addGPortal(g.x,g.y));
if(d.goal)addGoal(d.goal.x,d.goal.y);
};

window.uploadLevel = async()=>{
if(!currentUser) return alert("Login first");

if(!username){
alert("Username not loaded yet. Try again in a second.");
return;
}

const name = prompt("Level name?");
if(!name) return;

const code = btoa(JSON.stringify({
blocks:blocks.map(b=>({x:b.x,y:b.y})),
spikes:spikes.map(s=>({x:s.x,y:s.y})),
portals:portals.map(p=>({x:p.x,y:p.y})),
gportals:gportals.map(g=>({x:g.x,y:g.y})),
goal:goal?{x:goal.x,y:goal.y}:null
}));

await addDoc(collection(db,"levels"),{
name,
code,
creator: username, // ✅ NOW ALWAYS VALID
creatorId: currentUser.uid,
createdAt: Date.now(),
likes:0,
rating:0,
ratingCount:0,
featured:false
});

alert("Uploaded!");
};

/* FEED */
window.loadFeed=async()=>{
const q=query(collection(db,"levels"),orderBy("likes","desc"),limit(10));
const snap=await getDocs(q);

let levels=[];
snap.forEach(d=>levels.push({id:d.id,...d.data()}));

showFeed(levels);
};

/* SEARCH */
window.searchLevels=async()=>{
let name=prompt("Level name");
const q=query(collection(db,"levels"),where("name","==",name));
const snap=await getDocs(q);

let levels=[];
snap.forEach(d=>levels.push({id:d.id,...d.data()}));

showFeed(levels);
};

/* FEED UI */
function showFeed(levels){
let w=window.open();
w.document.write(`<body style="background:#0b0b22;color:white;font-family:Arial"><h2>Levels</h2><div id="list"></div></body>`);

let list=w.document.getElementById("list");

levels.forEach(l=>{
let avg = l.ratingCount ? (l.rating / l.ratingCount) : 0;
avg = Number.isInteger(avg) ? avg : avg.toFixed(1);

let div=w.document.createElement("div");

/* STYLE */
let border="2px solid gray";
let glow="none";

if(l.featured){
border="2px solid gold";
glow="0 0 15px gold";
}
else if(l.ratingCount>0){
border="2px solid deepskyblue";
}

div.style=`
background:#111;
padding:12px;
margin:12px;
border-radius:10px;
border:${border};
box-shadow:${glow};
`;

div.innerHTML=`
<b>${l.name}</b><br>
By: ${l.creator}<br>
Likes: ${l.likes}<br>
Rating: ${avg} ⭐ (${l.ratingCount})<br><br>
<button>Play</button>
<button>Like</button>
<button>Rate</button>
`;

let [play,like,rate]=div.querySelectorAll("button");

play.onclick=()=>{loadLevel(l.code);w.close();};
like.onclick=async()=>{await likeLevel(l.id);like.innerText="Liked!";};

/* FIXED RATE BUTTON */
rate.onclick=()=>{
let input = w.prompt("Rate this level (1-10)");
if(input === null) return;

let r = Number(input.trim());
if(Number.isNaN(r) || r < 1 || r > 10){
w.alert("Invalid rating");
return;
}

let featured = w.confirm("Feature this level?");

// call parent safely
window.rateLevelFromChild(l.id, r, featured);
};

list.appendChild(div);
});
}

/* LIKE */
window.likeLevel=async(id)=>{
await updateDoc(doc(db,"levels",id),{likes:increment(1)});
};

/* RATE (ONLY YOU + WORKING PROMPT) */
window.rateLevel=async(id)=>{
if(auth.currentUser?.email!=="alexsmall313@gmail.com"){
alert("Only you can rate");
return;
}

let input=window.prompt("Rate this level (1-10)");
if(input===null) return;

let r=Number(input.trim());
if(Number.isNaN(r)||r<1||r>10){
alert("Invalid rating");
return;
}

let featured=window.confirm("Feature this level?");

await updateDoc(doc(db,"levels",id),{
rating:increment(r),
ratingCount:increment(1),
featured:featured
});

alert("Rated!");
};

window.rateLevelFromChild = async(id, r, featured)=>{
if(!currentUser || currentUser.email !== "alexsmall313@gmail.com"){
alert("Only you can rate");
return;
}

await updateDoc(doc(db,"levels",id),{
rating: increment(r),
ratingCount: increment(1),
featured: featured
});

alert("Rated!");
};

/* EDIT */
game.onclick=e=>{
if(mode!=="edit")return;

const r=game.getBoundingClientRect();
let x=Math.round((e.clientX-r.left+camera.x)/40)*40;
let y=Math.round((e.clientY-r.top+camera.y)/40)*40;

if(tool==="delete"){

blocks=blocks.filter(b=>{
let hit=Math.abs(b.x-x)<60&&Math.abs(b.y-y)<30;
if(hit)b.el.remove();
return !hit;
});

spikes=spikes.filter(s=>{
let hit=Math.abs(s.x-x)<30&&Math.abs(s.y-y)<30;
if(hit)s.el.remove();
return !hit;
});

portals=portals.filter(p=>{
let hit=Math.abs(p.x-x)<30&&Math.abs(p.y-y)<40;
if(hit)p.el.remove();
return !hit;
});

gportals=gportals.filter(g=>{
let hit=Math.abs(g.x-x)<30&&Math.abs(g.y-y)<40;
if(hit)g.el.remove();
return !hit;
});

if(goal&&Math.abs(goal.x-x)<40&&Math.abs(goal.y-y)<60){
goal.el.remove();
goal=null;
}

return;
}
  
if(tool==="block")addBlock(x,y);
if(tool==="spike")addSpike(x,y);
if(tool==="portal")addPortal(x,y);
if(tool==="gportal")addGPortal(x,y);
if(tool==="goal")addGoal(x,y);
};



/* LOOP */
function update(){

camera.x+=(player.x-200-camera.x)*0.08;
camera.y+=(player.y-200-camera.y)*0.08;

if(mode==="play"){

if(keys["a"]||keys["ArrowLeft"]) player.vx=-4;
else if(keys["d"]||keys["ArrowRight"]) player.vx=4;
else player.vx*=0.8;

player.vy+=0.6;
player.x+=player.vx;
player.y+=player.vy;

player.grounded=false;

blocks.forEach(b=>{
if(player.x<b.x+120 && player.x+30>b.x && player.y<b.y+20 && player.y+30>b.y){
player.y=b.y-30;
player.vy=0;
player.grounded=true;
}
});

/* ROTATION */
if(!player.grounded){
rotation+=8;
}else{
rotation=0;
}

spikes.forEach(s=>{
if(Math.abs(player.x-s.x)<25 && Math.abs(player.y-s.y)<25){
player.x=100;player.y=200;player.vx=0;player.vy=0;
}
});

}

/* RENDER */
p.style.left=(player.x-camera.x)+"px";
p.style.top=(player.y-camera.y)+"px";
p.style.transform=`rotate(${rotation}deg)`;

[blocks,spikes,portals,gportals].forEach(arr=>{
arr.forEach(o=>{
o.el.style.left=(o.x-camera.x)+"px";
o.el.style.top=(o.y-camera.y)+"px";
});
});

if(goal){
goal.el.style.left=(goal.x-camera.x)+"px";
goal.el.style.top=(goal.y-camera.y)+"px";
}

requestAnimationFrame(update);
}

addBlock(50,300);
update();

</script>
</body>
</html>
