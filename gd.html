<body>

<div id="ui">
<button onclick="setMode('play')">Play</button>
<button onclick="setMode('edit')">Edit</button>

<button onclick="setTool('block')">Block</button>
<button onclick="setTool('spike')">Spike</button>
<button onclick="setTool('fakeblock')">Fake Block</button>
<button onclick="setTool('fakespike')">Fake Spike</button>
<button onclick="setTool('portal')">Portal</button>
<button onclick="setTool('gportal')">Gravity</button>
<button onclick="setTool('goal')">Goal</button>
<button onclick="setTool('delete')">Delete</button>

<button onclick="saveLevel()">Save</button>
<button onclick="loadLevel(prompt('Paste code'))">Load</button>

</div>

<div id="userDisplay">Not logged in</div>

<div id="popup">
<div id="panel">
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<input id="usernameInput" placeholder="username (signup only)">
<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>
<button onclick="closePopup()">Close</button>
</div>
</div>

<div id="game"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy,
limit,
updateDoc,
doc,
increment,
where,
setDoc,
getDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyDk5qh-pydPe6vfBG7KFhl50zderbGggW4",
authDomain:"gdeditor-b9a32.firebaseapp.com",
projectId:"gdeditor-b9a32"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* USER */
let currentUser = null;
let username = "";
let editingLevelId = null;

onAuthStateChanged(auth, async(u)=>{

currentUser = u;

const display = document.getElementById("userDisplay");

if(!u){
username="";
display.innerText="Not logged in";
return;
}

try{

const snap = await getDoc(doc(db,"users",u.uid));

if(snap.exists()){
username = snap.data().username || "";
display.innerText = username;
}else{
display.innerText = "No profile";
}

}catch(e){
console.error(e);
display.innerText = "Error";
}

});

/* POPUP */
const popup=document.getElementById("popup");

window.openPopup=()=>{
popup.classList.add("show");
};

window.closePopup=()=>{
popup.classList.remove("show");
};

/* AUTH */
window.login=async()=>{

try{

await signInWithEmailAndPassword(
auth,
email.value,
pass.value
);

closePopup();

}catch(e){
alert(e.message);
}

};

window.signup=async()=>{

try{

const name=usernameInput.value.trim();

if(!name) return alert("Enter username");

const user = await createUserWithEmailAndPassword(
auth,
email.value,
pass.value
);

await setDoc(doc(db,"users",user.user.uid),{
username:name
});

username=name;

alert("Account created!");

closePopup();

}catch(e){
alert(e.message);
}

};

/* GAME */
const game=document.getElementById("game");

let mode="play";
let tool="block";

let camera={
x:0,
y:0
};

let keys={};

let player={
x:100,
y:200,
vx:0,
vy:0,
grounded:false,
canJump:true
};

let rotation=0;

const p=document.createElement("div");
p.className="player";
game.appendChild(p);

/* WORLD */
let blocks=[];
let spikes=[];
let fakeblocks=[];
let fakespikes=[];
let portals=[];
let gportals=[];
let goal=null;

/* INPUT */
addEventListener("keydown",e=>{

keys[e.key]=true;

if(
(e.key===" " || e.key==="ArrowUp")
&& player.canJump
&& player.grounded
){
player.vy=-10;
player.canJump=false;
}

});

addEventListener("keyup",e=>{

keys[e.key]=false;

if(e.key===" " || e.key==="ArrowUp"){
player.canJump=true;
}

});

/* UI */
window.setMode=(m)=>mode=m;
window.setTool=(t)=>tool=t;

/* OBJECTS */
function make(cls,x,y,arr){

let el=document.createElement("div");

el.className=cls;

game.appendChild(el);

arr.push({
x,
y,
el
});

}

const addBlock=(x,y)=>make("block",x,y,blocks);
const addSpike=(x,y)=>make("spike",x,y,spikes);
const addFakeBlock=(x,y)=>make("fakeblock",x,y,fakeblocks);
const addFakeSpike=(x,y)=>make("fakespike",x,y,fakespikes);
const addPortal=(x,y)=>make("portal",x,y,portals);
const addGPortal=(x,y)=>make("gportal",x,y,gportals);

function addGoal(x,y){

if(goal){
goal.el.remove();
}

let el=document.createElement("div");

el.className="goal";

game.appendChild(el);

goal={
x,
y,
el
};

}

/* SAVE */
window.saveLevel=()=>{

const data={

blocks:blocks.map(b=>({
x:b.x,
y:b.y
})),

spikes:spikes.map(s=>({
x:s.x,
y:s.y
})),

fakeblocks:fakeblocks.map(b=>({
x:b.x,
y:b.y
})),

fakespikes:fakespikes.map(s=>({
x:s.x,
y:s.y
})),

portals:portals.map(p=>({
x:p.x,
y:p.y
})),

gportals:gportals.map(g=>({
x:g.x,
y:g.y
})),

goal:goal ? {
x:goal.x,
y:goal.y
} : null

};

prompt(
"COPY",
btoa(JSON.stringify(data))
);

};

/* LOAD */
window.loadLevel=(code)=>{

const d=JSON.parse(atob(code));

[
blocks,
spikes,
fakeblocks,
fakespikes,
portals,
gportals
].forEach(arr=>{

arr.forEach(o=>o.el.remove());

});

if(goal){
goal.el.remove();
}

blocks=[];
spikes=[];
fakeblocks=[];
fakespikes=[];
portals=[];
gportals=[];
goal=null;

(d.blocks||[]).forEach(b=>addBlock(b.x,b.y));
(d.spikes||[]).forEach(s=>addSpike(s.x,s.y));
(d.fakeblocks||[]).forEach(b=>addFakeBlock(b.x,b.y));
(d.fakespikes||[]).forEach(s=>addFakeSpike(s.x,s.y));
(d.portals||[]).forEach(p=>addPortal(p.x,p.y));
(d.gportals||[]).forEach(g=>addGPortal(g.x,g.y));

if(d.goal){
addGoal(d.goal.x,d.goal.y);
}

};

/* UPLOAD */
window.uploadLevel = async()=>{

if(!currentUser){
return alert("Login first");
}

if(!username){
return alert("Username not loaded yet.");
}

const code = btoa(JSON.stringify({

blocks:blocks.map(b=>({
x:b.x,
y:b.y
})),

spikes:spikes.map(s=>({
x:s.x,
y:s.y
})),

fakeblocks:fakeblocks.map(b=>({
x:b.x,
y:b.y
})),

fakespikes:fakespikes.map(s=>({
x:s.x,
y:s.y
})),

portals:portals.map(p=>({
x:p.x,
y:p.y
})),

gportals:gportals.map(g=>({
x:g.x,
y:g.y
})),

goal:goal ? {
x:goal.x,
y:goal.y
} : null

}));

/* EDIT */
if(editingLevelId){

try{

await updateDoc(
doc(db,"levels",editingLevelId),
{
code,
updatedAt:Date.now()
}
);

alert("Level updated!");

editingLevelId=null;

return;

}catch(e){

console.error(e);

editingLevelId=null;

alert("Edit failed.");
}

}

/* NEW UPLOAD */
const name=prompt("Level name?");

if(!name) return;

await addDoc(collection(db,"levels"),{

name,
code,

creator:username,
creatorId:currentUser.uid,

createdAt:Date.now(),

likes:0,
rating:0,
ratingCount:0,
featured:false

});

editingLevelId=null;

alert("Uploaded!");

};

/* FEED */
window.loadFeed=async()=>{

const q=query(
collection(db,"levels"),
orderBy("likes","desc"),
limit(20)
);

const snap=await getDocs(q);

let levels=[];

snap.forEach(d=>{

levels.push({
id:d.id,
...d.data()
});

});

showFeed(levels);

};

/* SEARCH */
window.searchLevels=async()=>{

let name=prompt("Level name");

const q=query(
collection(db,"levels"),
where("name","==",name)
);

const snap=await getDocs(q);

let levels=[];

snap.forEach(d=>{

levels.push({
id:d.id,
...d.data()
});

});

showFeed(levels);

};

/* FEED UI */
function showFeed(levels){

let w=window.open();

w.document.write(`

}

}

}

let list=w.document.getElementById("list");

levels.forEach(l=>{

let avg = l.ratingCount > 0
? Math.round(l.rating)
: "Unrated";

/* CARD */
let div=w.document.createElement("div");

let classes="card";

if(l.featured){
classes+=" featured";
}
else if(l.ratingCount>0){
classes+=" rated";
}

div.className=classes;

/* BADGES */
let badge="";

if(l.featured){
badge=`<div class="badge featuredBadge">FEATURED</div>`;
}
else if(l.ratingCount>0){
badge=`<div class="badge ratedBadge">RATED</div>`;
}

/* HTML */
div.innerHTML=`

${badge}

<div class="levelTitle">${l.name}</div>

<div class="creator">
By ${l.creator}
</div>

<div class="stats">

<div class="stat">
👍 ${l.likes}
</div>

⭐ ${avg}
</div>

</div>

<div class="btnRow">

<button class="playBtn">
▶ Play
</button>

<button class="likeBtn">
👍 Like
</button>

<button class="dislikeBtn">
👎 Dislike
</button>

${currentUser?.email==="alexsmall313@gmail.com"
? `
<button class="rateBtn">
⭐ Rate
</button>
`
: ""
}

${l.creatorId===currentUser?.uid
? `

✏ Edit
</button>

🗑 Delete
</button>
`
: ""
}

</div>
`;

/* BUTTONS */
const play=div.querySelector(".playBtn");
const like=div.querySelector(".likeBtn");
const dislike=div.querySelector(".dislikeBtn");
const rate=div.querySelector(".rateBtn");
const edit=div.querySelector(".editBtn");
const del=div.querySelector(".deleteBtn");

/* PLAY */
play.onclick=()=>{

editingLevelId=null;

loadLevel(l.code);

player.x=100;
player.y=200;

player.vx=0;
player.vy=0;

keys={};

rotation=0;

mode="play";

w.close();

};

/* LIKE */
like.onclick=async()=>{

await likeLevel(l.id);

};

/* DISLIKE */
dislike.onclick=async()=>{

await dislikeLevel(l.id);

};

/* RATE */
if(rate){

rate.onclick=()=>{

let input=w.prompt("Rate 1-10");

if(input===null) return;

let r=Number(input);

if(Number.isNaN(r)||r<1||r>10){
return w.alert("Invalid");
}

let featured=w.confirm("Feature level?");

window.rateLevelFromChild(
l.id,
r,
featured
);

};

}

/* EDIT */
if(edit){

edit.onclick=()=>{

loadLevel(l.code);

player.x=100;
player.y=200;

player.vy=0;

keys={};

rotation=0;

mode="edit";

w.close();

};

}

/* DELETE */
if(del){

del.onclick=async()=>{

doc(db,"levels",l.id)
);

div.remove();

});

}
window.rateLevelFromChild = async(id,r,featured)=>{

if(currentUser?.email!=="alexsmall313@gmail.com"){
return alert("No permission");
}

const ref = doc(db,"levels",id);

await updateDoc(ref,{
rating:r,
ratingCount:1,
featured
});

alert("Rated!");
};

/* EDIT MODE */
game.onclick=e=>{

if(mode!=="edit") return;

const r=game.getBoundingClientRect();

let x=Math.round(
(e.clientX-r.left+camera.x)/40
)*40;

let y=Math.round(
(e.clientY-r.top+camera.y)/40
)*40;

/* DELETE */
if(tool==="delete"){

const delCheck=(arr,w,h)=>{

return arr.filter(o=>{

let hit=
Math.abs(o.x-x)<w &&
Math.abs(o.y-y)<h;

if(hit){
o.el.remove();
}

return !hit;

});

};

blocks=delCheck(blocks,60,30);
spikes=delCheck(spikes,30,30);
fakeblocks=delCheck(fakeblocks,60,30);
fakespikes=delCheck(fakespikes,30,30);
portals=delCheck(portals,30,40);
gportals=delCheck(gportals,30,40);

if(
goal &&
Math.abs(goal.x-x)<40 &&
Math.abs(goal.y-y)<60
){
goal.el.remove();
goal=null;
}

return;

}

/* PLACE */
if(tool==="block") addBlock(x,y);
if(tool==="spike") addSpike(x,y);
if(tool==="fakeblock") addFakeBlock(x,y);
if(tool==="fakespike") addFakeSpike(x,y);
if(tool==="portal") addPortal(x,y);
if(tool==="gportal") addGPortal(x,y);
if(tool==="goal") addGoal(x,y);

};

/* UPDATE */
function update(){

if(mode==="play"){

camera.x+=(player.x-200-camera.x)*0.08;
camera.y+=(player.y-200-camera.y)*0.08;

}

/* EDITOR CAMERA MOVEMENT */
if(mode==="edit"){

const speed = 10;

if(keys["a"] || keys["ArrowLeft"]){
camera.x -= speed;
}

if(keys["d"] || keys["ArrowRight"]){
camera.x += speed;
}

if(keys["w"] || keys["ArrowUp"]){
camera.y -= speed;
}

if(keys["s"] || keys["ArrowDown"]){
camera.y += speed;
}

}

if(mode==="play"){

if(keys["a"]||keys["ArrowLeft"]){
player.vx=-4;
}
else if(keys["d"]||keys["ArrowRight"]){
player.vx=4;
}
else{
player.vx*=0.8;
}

player.vy+=0.6;

player.x+=player.vx;
player.y+=player.vy;

/* FALL RESET */
if(player.y>window.innerHeight+2000){

player.x=100;
player.y=200;

player.vx=0;
player.vy=0;

}

/* COLLISION */
player.grounded=false;

blocks.forEach(b=>{

if(
player.x<b.x+120 &&
player.x+30>b.x &&
player.y<b.y+20 &&
player.y+30>b.y
){

player.y=b.y-30;

player.vy=0;

player.grounded=true;

}

});

/* ROTATION */
if(!player.grounded){
rotation+=8;
}else{
rotation=0;
}

/* SPIKES */
spikes.forEach(s=>{

if(
Math.abs(player.x-s.x)<25 &&
Math.abs(player.y-s.y)<25
){

player.x=100;
player.y=200;

player.vx=0;
player.vy=0;

keys={};

rotation=0;

}

});

/* GOAL */
if(goal){

if(

player.x < goal.x+40 &&
player.x+30 > goal.x &&
player.y < goal.y+80 &&
player.y+30 > goal.y

){

alert("Level Complete!");

player.x=100;
player.y=200;

player.vx=0;
player.vy=0;

player.grounded=false;
player.canJump=true;

keys={};

rotation=0;

}

}

}

/* RENDER */
p.style.left=(player.x-camera.x)+"px";
p.style.top=(player.y-camera.y)+"px";

p.style.transform=`
rotate(${rotation}deg)
`;

[
blocks,
spikes,
fakeblocks,
fakespikes,
portals,
gportals
].forEach(arr=>{

arr.forEach(o=>{

o.el.style.left=(o.x-camera.x)+"px";
o.el.style.top=(o.y-camera.y)+"px";

});

});

if(goal){

goal.el.style.left=(goal.x-camera.x)+"px";
goal.el.style.top=(goal.y-camera.y)+"px";

}

requestAnimationFrame(update);

}

addBlock(50,300);

update();

</script>
</body>
</html>
