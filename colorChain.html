<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
collection,
addDoc,
getDocs,
onSnapshot,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB5ZJxLpU_e5N_MUDLIZaZSB-kutZuut7g",
authDomain: "colorchain-a2ed9.firebaseapp.com",
projectId: "colorchain-a2ed9",
storageBucket: "colorchain-a2ed9.firebasestorage.app",
messagingSenderId: "488361709336",
appId: "1:488361709336:web:99e1566838db66f944586d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const rows = 8;
const cols = 6;

let board = {};
let currentRoom = null;
let playerColor = null;
let myUsername = "Player";
let gameEnded = false;
let myRating = 1000;
let selectedPrivacy = "public";

const boardEl = document.getElementById("board");

window.openCreatePopup = ()=>{
document.getElementById("createPopupBg")
.style.display = "flex";
};

window.closeJoinPopup = ()=>{

document.getElementById("joinPopupBg")
.style.display = "none";

};

window.closeCreatePopup = ()=>{
document.getElementById("createPopupBg")
.style.display = "none";
};

window.closeCodePopup = ()=>{

document.getElementById("codePopupBg")
.style.display = "none";

};

window.setPrivacy = (type)=>{

selectedPrivacy = type;

const pub = document.getElementById("publicBtn");
const pri = document.getElementById("privateBtn");

pub.classList.remove("activePrivacy");
pri.classList.remove("activePrivacy");

if(type === "public"){
pub.classList.add("activePrivacy");
}else{
pri.classList.add("activePrivacy");
}

};

function createBoardData(){
const data = {};

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

data[`${r}_${c}`] = {
owner:null,
count:0
};

}
}

return data;
}

function getCell(r,c){
return board[`${r}_${c}`];
}

function renderBoard(){
boardEl.innerHTML = "";

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

const data = getCell(r,c);

const cell = document.createElement("div");
cell.className = "cell";

if(data.owner){
cell.classList.add(data.owner);
}

const orbs = document.createElement("div");
orbs.className = "orbs";

for(let i=0;i<data.count;i++){
const orb = document.createElement("div");
orb.className = `orb ${data.owner}Orb`;
orbs.appendChild(orb);
}

cell.appendChild(orbs);
cell.onclick = ()=>playMove(r,c);

boardEl.appendChild(cell);
}
}
}

function getLimit(r,c){

/*
User wants ALL tiles to explode only at 4.
No special corner/edge rules.
*/

return 4;
}

function explode(r,c,color){

navigator.vibrate?.(30);

document.getElementById("board")
.animate([
{transform:"translateX(-4px)"},
{transform:"translateX(4px)"},
{transform:"translateX(0px)"}
],{
duration:120
});

const current = getCell(r,c);

if(current.count < getLimit(r,c)) return;

current.owner = null;
current.count = 0;

const dirs = [
[1,0],
[-1,0],
[0,1],
[0,-1]
];

for(const d of dirs){

const nr = r + d[0];
const nc = c + d[1];

if(nr>=0&&nc>=0&&nr<rows&&nc<cols){

const near = getCell(nr,nc);

near.owner = color;
near.count++;

if(near.count >= getLimit(nr,nc)){
explode(nr,nc,color)
}

}
}
}

async function updateRating(winnerColor){

const roomRef = doc(db,"rooms",currentRoom);
const snap = await getDoc(roomRef);

if(!snap.exists()) return;

const room = snap.data();

const red = room.players.red;
const blue = room.players.blue;

if(!red || !blue) return;

const redRef = doc(db,"users",red.uid);
const blueRef = doc(db,"users",blue.uid);

const redSnap = await getDoc(redRef);
const blueSnap = await getDoc(blueRef);

const redData = redSnap.data();
const blueData = blueSnap.data();

let redRating = redData.elo || 1000;
let blueRating = blueData.elo || 1000;

const expectedRed =
1 / (1 + Math.pow(10,(blueRating-redRating)/400));

const expectedBlue =
1 / (1 + Math.pow(10,(redRating-blueRating)/400));

const K = 32;

const redScore = winnerColor === "red" ? 1 : 0;
const blueScore = winnerColor === "blue" ? 1 : 0;

redRating =
Math.round(
redRating + K * (redScore - expectedRed)
);

blueRating =
Math.round(
blueRating + K * (blueScore - expectedBlue)
);

await updateDoc(redRef,{
elo:redRating,
wins:(redData.wins||0)+(winnerColor==="red"?1:0),
losses:(redData.losses||0)+(winnerColor==="blue"?1:0)
});

await updateDoc(blueRef,{
elo:blueRating,
wins:(blueData.wins||0)+(winnerColor==="blue"?1:0),
losses:(blueData.losses||0)+(winnerColor==="red"?1:0)
});

}

async function syncRoom(nextTurn,winner=null){

await updateDoc(doc(db,"rooms",currentRoom),{
board,
turn:nextTurn,
winner
});
}

let moveCount = 0;

function calculateWinner(){

/*
Prevent instant wins/glitches.
A player cannot win until BOTH
players have placed at least once.
*/

if(moveCount < 2) return null;

let red = 0;
let blue = 0;

for(const key in board){

if(board[key].owner === "red") red++;
if(board[key].owner === "blue") blue++;

}

if(red > 0 && blue === 0)
return "RED WINS";

if(blue > 0 && red === 0)
return "BLUE WINS";

return null;
}

async function playMove(r,c){

if(gameEnded) return;
if(!currentRoom) return;

const roomRef = doc(db,"rooms",currentRoom);
const snap = await getDoc(roomRef);

if(!snap.exists()) return;

const room = snap.data();

if(room.winner) return;
if(room.turn !== playerColor) return;

const current = getCell(r,c);

if(current.owner && current.owner !== playerColor)
return;

current.owner = playerColor;
current.count++;

moveCount++;

if(current.count >= getLimit(r,c)){
explode(r,c,playerColor);
}

const winner = calculateWinner();

if(winner){

gameEnded = true;

await updateRating(
winner.includes("RED")
? "red"
: "blue"
);

await syncRoom(null,winner);

showWinner(winner);

return;
}

const nextTurn =
playerColor === "red"
? "blue"
: "red";

await syncRoom(nextTurn,null);
}

function showWinner(text){
if(gameEnded) return;

gameEnded = true;

document.getElementById("winScreen").style.display = "flex";
document.getElementById("winText").textContent = text;
}

window.openCodePopup = ()=>{

document.getElementById("codePopupBg")
.style.display = "flex";

};

window.joinByCode = async ()=>{

const code =
document.getElementById("roomCodeInput")
.value.trim();

if(!code){
alert("Enter a room code");
return;
}

await joinSpecificRoom(code);

closeCodePopup();

};

window.signUp = async ()=>{

try{

const username = document.getElementById("username").value.trim();
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

const cred = await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"users",cred.user.uid),{
username,
elo:1000,
wins:0,
losses:0
});

}catch(err){
alert(err.message);
}
};

window.signIn = async ()=>{

try{

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,password);

}catch(err){
alert(err.message);
}
};

onAuthStateChanged(auth,async user=>{

if(!user) return;

const snap = await getDoc(doc(db,"users",user.uid));

if(snap.exists()){
myUsername = snap.data().username;
myRating = snap.data().elo || 1000;
}

board = createBoardData();
renderBoard();

document.getElementById("auth").style.display = "none";
document.getElementById("game").style.display = "flex";
document.getElementById("me").innerHTML =
playerColor === "red"
? `🔴 ${myUsername} (RED) • Rating: ${myRating}`
: `🔵 ${myUsername} (BLUE) • Rating: ${myRating}`;
});

window.confirmCreateRoom = async ()=>{

const roomName =
document.getElementById("roomName")
.value.trim() || `${myUsername}'s Room`;

const room = await addDoc(collection(db,"rooms"),{

name:roomName,
privacy:selectedPrivacy,
createdAt:Date.now(),
hostRating:myRating,

board:createBoardData(),
turn:"red",
winner:null,

players:{
red:{
uid:auth.currentUser.uid,
username:myUsername,
rating:myRating
},
blue:null
}

});

currentRoom = room.id;
playerColor = "red";

closeCreatePopup();
listenRoom();

alert(`Room Code: ${room.id}`);

};

window.openJoinMenu = async ()=>{

document.getElementById("joinPopupBg")
.style.display = "flex";

const roomList =
document.getElementById("roomList");

roomList.innerHTML = "";

const snaps =
await getDocs(collection(db,"rooms"));

let rooms = [];

snaps.forEach(s=>{

const d = s.data();

if(
d.privacy === "public" &&
!d.players.blue &&
!d.winner
){
rooms.push({
id:s.id,
...d
});
}

});

rooms.sort((a,b)=>{

const diffA =
Math.abs((a.hostRating||1000)-myRating);

const diffB =
Math.abs((b.hostRating||1000)-myRating);

return diffA - diffB;

});

rooms.forEach(room=>{

const div = document.createElement("div");

div.className = "roomCard";

div.innerHTML = `

<div class="roomLeft">

<div class="roomTitle">
${room.name}
</div>

<div class="roomHost">
🔴 ${room.players.red.username}
</div>

<div class="roomRating">
Rating: ${room.hostRating}
</div>

<div class="roomRating">
You will play as BLUE
</div>

</div>

<button
class="joinBtn"
onclick="joinSpecificRoom('${room.id}')"
>
JOIN
</button>
`;

roomList.appendChild(div);

});

};

window.joinSpecificRoom = async (roomId)=>{

const roomRef = doc(db,"rooms",roomId);

const snap = await getDoc(roomRef);

if(!snap.exists()){
alert("Room not found");
return;
}

const data = snap.data();

if(data.players.blue){
alert("Room is full");
return;
}

if(data.winner){
alert("Game already ended");
return;
}

await updateDoc(roomRef,{

"players.blue":{
uid:auth.currentUser.uid,
username:myUsername,
rating:myRating
}

});

currentRoom = roomId;
playerColor = "blue";

document.getElementById("joinPopupBg")
.style.display = "none";

listenRoom();

};

window.joinRandomRoom = async ()=>{

const snaps =
await getDocs(collection(db,"rooms"));

let bestRoom = null;
let bestDiff = 999999;

snaps.forEach(s=>{

const d = s.data();

if(
d.privacy === "public" &&
!d.players.blue &&
!d.winner
){

const diff =
Math.abs((d.hostRating||1000)-myRating);

if(diff < bestDiff){

bestDiff = diff;

bestRoom = {
id:s.id,
...d
};

}

}

});

if(bestRoom){

joinSpecificRoom(bestRoom.id);

}else{

alert("No public rooms found");

}

};

window.joinRoom = async ()=>{

const snaps = await getDocs(collection(db,"rooms"));

for(const s of snaps.docs){

const data = s.data();

if(!data.players.blue && !data.winner){

await updateDoc(doc(db,"rooms",s.id),{
"players.blue":{
uid:auth.currentUser.uid,
username:myUsername
}
});

currentRoom = s.id;
playerColor = "blue";

listenRoom();

alert("Joined Room");

break;
}
}
};

function listenRoom(){

onSnapshot(doc(db,"rooms",currentRoom),async snap=>{

if(!snap.exists()){
alert("Room Closed");
location.reload();
return;
}

const data = snap.data();

board = data.board;
renderBoard();

if(playerColor === "red"){

if(data.players.blue){
document.getElementById("opponent").textContent =
"VS " + data.players.blue.username;
}

}else{

if(data.players.red){
document.getElementById("opponent").textContent =
"VS " + data.players.red.username;
}
}

if(data.winner){

gameEnded = true;

showWinner(data.winner);


}

document.getElementById("roomText").textContent = currentRoom;

document.getElementById("turnText").textContent =
data.turn
? "Turn: " + data.turn.toUpperCase()
: "GAME OVER";

});
}

window.addEventListener("beforeunload",async ()=>{

if(!currentRoom) return;

try{

const roomRef = doc(db,"rooms",currentRoom);
const snap = await getDoc(roomRef);

if(!snap.exists()) return;

const data = snap.data();

if(playerColor === "red"){
data.players.red = null;
}else{
data.players.blue = null;
}

if(!data.players.red && !data.players.blue){
await deleteDoc(roomRef);
}else{
await updateDoc(roomRef,{players:data.players});
}

}catch(err){}

});

board = createBoardData();
renderBoard();

</script>

</body>
</html>
