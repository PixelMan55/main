name: Weekly puzzle email

on:
  schedule:
    # Runs 9am UTC every Monday. Adjust the cron for your preferred time —
    # cron times are always UTC regardless of anyone's local timezone.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}   # adds a manual "Run workflow" button for testing

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install firebase-admin resend

      - name: Send weekly email
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
        run: node scripts/send-weekly-email.js
